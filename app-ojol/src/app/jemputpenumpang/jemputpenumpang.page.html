<ion-content>
  <!-- MAP SECTION -->
  <div class="map-wrapper">
  <div id="map-jemput-penumpang"></div>
    <ion-button fill="clear" class="navigate-btn">
      <ion-icon name="navigate-outline"></ion-icon>
    </ion-button>
  </div>

  <!-- CUSTOMER CARD -->
  <div class="customer-card">
    <ion-icon name="chatbubble-ellipses-outline" class="chat-icon" (click)="bukaChat()"></ion-icon>
    <div class="customer-info">
      <div class="profile-pic"></div>
      <div class="name">Rifha Reinda Warich</div>
    </div>
    <div class="pemisah-horizontal"></div>
    <div class="address-section">
      <div class="alamat-item">
        <ion-icon name="location-sharp"></ion-icon>
        <span>Perum Karaba Indah blok R.48</span>
      </div>
      <div class="line-vertical"></div>
      <div class="alamat-item">
       <ion-icon name="flag-sharp"></ion-icon>
        <span>Universitas Buana Perjuangan Karawang</span>
      </div>
    </div>

    <div class="total-section">
      <span>Total</span>
      <span class="harga">Rp. 24.000</span>
    </div>
    <ion-button expand="block" class="menuju-btn" fill="solid" (click)="menujuCustomer()"> Menuju Customer </ion-button>
  </div>
</ion-content>
